<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Results Portal | Dark Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0f121a;
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header Section */
        header {
            padding: 60px 20px 40px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Grid Container */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Advanced Card Design */
        .grade-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* Hover Glow Effect */
        .grade-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
        }

        .grade-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--accent-glow);
        }

        .grade-card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .grade-label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .grade-title {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .status-badge {
            font-size: 0.75rem;
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 100px;
            margin-top: 12px;
            display: inline-block;
        }

        .arrow-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.4s ease;
            z-index: 1;
        }

        .grade-card:hover .arrow-icon {
            background: var(--accent);
            color: #000;
            transform: rotate(-45deg);
        }

        /* Animations Stagger */
        .grade-card:nth-child(1) { animation-delay: 0.1s; }
        .grade-card:nth-child(2) { animation-delay: 0.2s; }
        .grade-card:nth-child(3) { animation-delay: 0.3s; }
        .grade-card:nth-child(4) { animation-delay: 0.4s; }
        .grade-card:nth-child(5) { animation-delay: 0.5s; }
        .grade-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Student Results Portal</h1>
        <p>ශිෂ්‍ය ප්‍රතිඵල පද්ධතිය වෙත සාදරයෙන් පිළිගනිමු. ඔබගේ ශ්‍රේණිය තෝරා ඉදිරියට යන්න.</p>
    </header>

    <div class="container">
        <script>
            const grades = [6, 7, 8, 9, 10, 11];
            const container = document.querySelector('.container');
            
            grades.forEach(g => {
                container.innerHTML += `
                    <div class="grade-card" onclick="navTo(${g})">
                        <div class="card-content">
                            <span class="grade-label">Academic Year</span>
                            <h2 class="grade-title">Grade 0${g < 10 ? g : g}</h2>
                            <span class="status-badge">Available Online</span>
                        </div>
                        <div class="arrow-icon">➔</div>
                    </div>
                `;
            });

            function navTo(grade) {
                const links = {
                    6: 'https://example.com/g6',
                    7: 'https://example.com/g7',
                    8: 'https://example.com/g8',
                    9: 'https://example.com/g9',
                    10: 'https://example.com/g10',
                    11: 'https://example.com/g11'
                };
                
                // Click Effect
                document.body.style.opacity = '0.5';
                setTimeout(() => {
                    window.location.href = links[grade];
                }, 300);
            }
        </script>
    </div>

    <footer>
        <p>&copy; 2026 OFFICIAL RESULTS MANAGEMENT SYSTEM</p>
        <p style="color: var(--accent); margin-top: 5px; font-weight: 500;">Designed for Excellence</p>
    </footer>

</body>
</html>
